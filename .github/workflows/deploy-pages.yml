# Build the Astro site under `site/` and deploy to GitHub Pages.
#
# Published URL: https://chomovazuzana.github.io/NbgAiHub/
#
# Enable once in repo Settings → Pages → Source: "GitHub Actions". Workflow
# then runs on every push to `main` (and on manual dispatch). The base path
# `/NbgAiHub` is configured in site/astro.config.mjs; postbuild rewrite is
# wired into the build script.
name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'glossary/**'
      - 'tips/**'
      - 'skills/**'
      - 'journeys/**'
      - 'news/published/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

# Required Pages permissions for the actions/deploy-pages step.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; supersede in-flight runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          # astro.config.mjs reads `process.env.PUBLIC_BASE` so the same
          # config can serve at root locally and under /NbgAiHub/ on Pages.
          PUBLIC_BASE: /NbgAiHub

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
